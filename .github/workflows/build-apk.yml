name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy Kotlin files
        run: |
          PKG="android/app/src/main/java/com/beachtilebot"
          mkdir -p "$PKG"
          cp plugins/android-src/BotAccessibilityService.kt "$PKG/"
          cp plugins/android-src/BotModule.kt "$PKG/"
          cp plugins/android-src/BotPackage.kt "$PKG/"

      - name: Copy accessibility XML
        run: |
          mkdir -p android/app/src/main/res/xml
          cp plugins/android-src/accessibility_service_config.xml android/app/src/main/res/xml/

      - name: Add string resource
        run: |
          FILE="android/app/src/main/res/values/strings.xml"
          if grep -q "accessibility_service_description" "$FILE" 2>/dev/null; then
            echo "String already exists"
          else
            sed -i 's|</resources>|    <string name="accessibility_service_description">Beach Tile Bot automatiza cliques no Beach Tile Match para coletar recompensas.</string>\n</resources>|' "$FILE" || echo "Could not update strings.xml"
          fi

      - name: Patch AndroidManifest - permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q "SYSTEM_ALERT_WINDOW" "$MANIFEST"; then
            echo "Permissions already present"
          else
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n</manifest>|' "$MANIFEST"
          fi

      - name: Patch AndroidManifest - service
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q "BotAccessibilityService" "$MANIFEST"; then
            echo "Service already declared"
          else
            sed -i 's|</application>|        <service android:name=".BotAccessibilityService" android:exported="true" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:label="Beach Tile Bot"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService"/></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config"/></service>\n    </application>|' "$MANIFEST"
          fi

      - name: Patch MainApplication.kt
        run: |
          MAIN=$(find android -name "MainApplication.kt" | head -1)
          node -e "
            var fs=require('fs');
            var c=fs.readFileSync('$MAIN','utf8');
            if(c.includes('BotPackage')){console.log('already patched');process.exit(0);}
            var old1='override fun getPackages(): List<ReactPackage> =\n          PackageList(this).packages';
            var old2='override fun getPackages(): List<ReactPackage> = PackageList(this).packages';
            var rep='override fun getPackages(): List<ReactPackage> { val packages=PackageList(this).packages; packages.add(BotPackage()); return packages }';
            if(c.includes(old1)){c=c.replace(old1,rep);}else if(c.includes(old2)){c=c.replace(old2,rep);}else{c=c.replace(/override fun getPackages\(\): List<ReactPackage>[^{]*PackageList\(this\)\.packages/,rep);}
            fs.writeFileSync('$MAIN',c);
            console.log('patched');
          "

      - name: Gradle build
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon
        working-directory: android
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BeachTileBot-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
