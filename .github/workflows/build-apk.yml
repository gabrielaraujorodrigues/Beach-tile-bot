name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Run Expo Prebuild (Android only)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch MainApplication.kt to register BotPackage
        run: |
          MAIN_APP=$(find android -name "MainApplication.kt" | head -1)
          echo "MainApplication path: $MAIN_APP"
          cat "$MAIN_APP" | grep -n "getPackages" || true
          node -e "
          const fs = require('fs');
          const file = process.argv[1];
          let content = fs.readFileSync(file, 'utf8');
          if (content.includes('BotPackage')) {
            console.log('BotPackage already registered');
          } else {
            const patterns = [
              ['override fun getPackages(): List<ReactPackage> =\n          PackageList(this).packages',
               'override fun getPackages(): List<ReactPackage> {\n          val packages = PackageList(this).packages\n          packages.add(BotPackage())\n          return packages\n        }'],
              ['override fun getPackages(): List<ReactPackage> = PackageList(this).packages',
               'override fun getPackages(): List<ReactPackage> {\n          val packages = PackageList(this).packages\n          packages.add(BotPackage())\n          return packages\n        }'],
            ];
            let patched = false;
            for (const [old, replacement] of patterns) {
              if (content.includes(old)) {
                content = content.replace(old, replacement);
                patched = true;
                break;
              }
            }
            if (!patched) {
              // Regex fallback
              content = content.replace(
                /override fun getPackages\(\): List<ReactPackage> =[\s\S]*?PackageList\(this\)\.packages/,
                'override fun getPackages(): List<ReactPackage> {\n          val packages = PackageList(this).packages\n          packages.add(BotPackage())\n          return packages\n        }'
              );
            }
            fs.writeFileSync(file, content);
            console.log('Patched:', file);
          }
          " "$MAIN_APP"

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Find APK files
        run: find android -name "*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BeachTileBot-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
