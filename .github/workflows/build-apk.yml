name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy Kotlin files
        run: |
          PKG="android/app/src/main/java/com/beachtilebot"
          mkdir -p "$PKG"
          cp plugins/android-src/BotAccessibilityService.kt "$PKG/"
          cp plugins/android-src/BotModule.kt "$PKG/"
          cp plugins/android-src/BotPackage.kt "$PKG/"
          cp plugins/android-src/BotForegroundService.kt "$PKG/"
          echo "Kotlin files:"
          ls "$PKG/"

      - name: Copy accessibility XML
        run: |
          mkdir -p android/app/src/main/res/xml
          cp plugins/android-src/accessibility_service_config.xml android/app/src/main/res/xml/

      - name: Add accessibility string resource
        run: |
          FILE="android/app/src/main/res/values/strings.xml"
          if grep -q "accessibility_service_description" "$FILE" 2>/dev/null; then
            echo "String already exists"
          else
            sed -i 's|</resources>|    <string name="accessibility_service_description">Beach Tile Bot automatiza cliques no Beach Tile Match para coletar recompensas.</string>\n</resources>|' "$FILE" || true
          fi

      - name: Patch AndroidManifest - permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q "SYSTEM_ALERT_WINDOW" "$MANIFEST"; then
            echo "Permissions already present"
          else
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n</manifest>|' "$MANIFEST"
          fi

      - name: Patch AndroidManifest - accessibility service
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q "BotAccessibilityService" "$MANIFEST"; then
            echo "Accessibility service already declared"
          else
            sed -i 's|</application>|        <service android:name=".BotAccessibilityService" android:exported="true" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:label="Beach Tile Bot"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService"/></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config"/></service>\n    </application>|' "$MANIFEST"
          fi

      - name: Patch AndroidManifest - foreground service
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q "BotForegroundService" "$MANIFEST"; then
            echo "Foreground service already declared"
          else
            sed -i 's|</application>|        <service android:name=".BotForegroundService" android:exported="false" android:foregroundServiceType="dataSync" />\n    </application>|' "$MANIFEST"
          fi

      - name: Patch MainApplication.kt - register BotPackage
        run: |
          MAIN=$(find android -name "MainApplication.kt" | head -1)
          echo "Patching: $MAIN"

          if grep -q "BotPackage" "$MAIN"; then
            echo "Already patched"
          elif grep -q "packages.apply {" "$MAIN"; then
            sed -i 's|packages\.apply {|packages.apply {\n              add(BotPackage())|' "$MAIN"
            echo "Patched: .apply{} form"
          elif grep -q "val packages = PackageList(this).packages" "$MAIN"; then
            sed -i '/val packages = PackageList(this)\.packages/a\          packages.add(BotPackage())' "$MAIN"
            echo "Patched: block form"
          elif grep -q "= PackageList(this).packages" "$MAIN"; then
            python3 - "$MAIN" << 'PYEOF'
          import sys, re
          path = sys.argv[1]
          with open(path) as f:
              content = f.read()
          pattern = r'([ \t]*override fun getPackages\(\): List<ReactPackage>)\s*=\s*PackageList\(this\)\.packages'
          def repl(m):
              ind = re.match(r'[ \t]*', m.group(1)).group()
              return (
                  ind + 'override fun getPackages(): List<ReactPackage> {\n' +
                  ind + '  val packages = PackageList(this).packages\n' +
                  ind + '  packages.add(BotPackage())\n' +
                  ind + '  return packages\n' +
                  ind + '}'
              )
          new = re.sub(pattern, repl, content)
          with open(path, 'w') as f:
              f.write(new)
          print("Patched: single-expression form")
          PYEOF
          else
            echo "ERROR: Could not find getPackages pattern"
            cat "$MAIN"
            exit 1
          fi

          echo "=== Result ==="
          grep -A 5 "getPackages" "$MAIN" || true

      - name: Gradle build
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -200
        working-directory: android
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Renomear APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk BeachTileBot.apk
          echo "APK pronto: $(du -sh BeachTileBot.apk | cut -f1)"

      - name: Publicar Release com APK para download direto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest BeachTileBot.apk \
            --title "Beach Tile Bot - Versao mais recente" \
            --notes "## Beach Tile Bot

          Baixe e instale o APK no seu Android.

          ### Como instalar:
          1. Baixe o arquivo **BeachTileBot.apk**
          2. Abra o arquivo no celular
          3. Permita instalacao de fontes desconhecidas se solicitado
          4. Instale e abra o app
          5. Conceda as permissoes de Acessibilidade, Sobreposicao e Bateria

          > Gerado automaticamente em $(date '+%d/%m/%Y %H:%M')" \
            --latest
          echo "Release publicado com sucesso!"
          echo "Link de download: https://github.com/${{ github.repository }}/releases/download/latest/BeachTileBot.apk"
